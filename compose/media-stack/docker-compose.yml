networks:
  servarrnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/24

services:

# ---------------- VPN ----------------
# PIA WireGuard via x0lie/pia-tun (same image as the vpn-exit LXC). Replaced
# qmcgaw/gluetun (PIA/OpenVPN) 2026-06-26 for WireGuard speed + homelab
# consistency. qbittorrent + slskd ride this netns (network_mode: service:pia-tun).
# Native PF sync (PS_CLIENT=qbittorrent) pushes the forwarded port into qbit,
# retiring the live-only scripts/sync-qbit-port.sh cron. WG iface is `pia0`.
# The `gluetun` network alias keeps existing http://gluetun:* references working.
  pia-tun:
    image: ghcr.io/x0lie/pia-tun:latest
    container_name: pia-tun
    hostname: pia-tun
    init: true
    cap_add: [ NET_ADMIN ]
    cap_drop: [ ALL ]
    devices: [ /dev/net/tun:/dev/net/tun ]
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
    networks:
      servarrnet:
        aliases: [ gluetun ]
    ports:
      - "8080:8080"   # qbittorrent WebUI (rides this netns)
      - "5030:5030"   # slskd
      - "5031:5031"   # slskd
    volumes:
      - ./gluetun:/run/pia-tun   # PORT_FILE → host-visible at ./gluetun/port
    environment:
      - PIA_USER=${OPENVPN_USER}
      - PIA_PASS=${OPENVPN_PASSWORD}
      - PIA_LOCATIONS=ca_toronto,ca_montreal   # closest PF-capable regions to home (US East); latency-picked, CA fallback
      - LOCAL_NETWORKS=10.0.0.0/24,100.64.0.0/10   # LAN + tailnet; NOT the container's own 172.23.0.0/24 (connected subnet is auto-allowed; listing it fails route-add)
      - DNS=pia
      - PF_ENABLED=true
      - PS_CLIENT=qbittorrent
      - PORT_FILE=/run/pia-tun/port
      - METRICS_ENABLED=true
      - METRICS_PORT=9090
      - INSTANCE_NAME=media-server
      - GET_REAL_IP=false
      - LOG_LEVEL=info
      - TZ=${TZ}
    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://127.0.0.1:9090/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

# ---------------- qBittorrent ----------------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:pia-tun"
    shm_size: "1gb" # Helps with stability during high-speed transfers
    depends_on:
      pia-tun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent:/config
      - ${DL}:/data/downloads
      - /mnt/media:/mnt/media
    healthcheck:
      # WebUI can stay up in a stale namespace after pia-tun restarts; require the WG iface too.
      test: ["CMD-SHELL", "test -d /sys/class/net/pia0 && curl -f http://localhost:8080/api/v2/app/version"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      - autoheal=true
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

# ---------------- Autoheal ----------------
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    network_mode: none
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=120
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

# ---------------- Prowlarr ----------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    networks: [ servarrnet ]
    ports:
      - "9696:9696"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./prowlarr:/config
    restart: unless-stopped

# ---------------- Sonarr ----------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    networks: [ servarrnet ]
    ports:
      - "8989:8989"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./sonarr:/config
      - ${DL}:/data/downloads
      - ${TV}:/data/tv
    restart: unless-stopped

# ---------------- Radarr ----------------
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    networks: [ servarrnet ]
    ports:
      - "7878:7878"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./radarr:/config
      - ${DL}:/data/downloads
      - ${MOVIES}:/data/movies
    restart: unless-stopped

# ---------------- Jellyseerr ----------------
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    networks: [ servarrnet ]
    ports:
      - "5055:5055"
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=debug
    volumes:
      - ./jellyseerr:/app/config
    restart: unless-stopped

# ---------------- Jellyfin ----------------
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    networks: [ servarrnet ]
    ports:
      - "8096:8096"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ./jellyfin:/config
      - ${TV}:/data/tv
      - ${MOVIES}:/data/movies
      - ${MUSIC}:/data/music
    restart: unless-stopped

# ---------------- Bazarr (subtitles) ----------------
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    networks: [ servarrnet ]
    ports:
      - "6767:6767"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./bazarr:/config
      - ${TV}:/data/tv
      - ${MOVIES}:/data/movies
    restart: unless-stopped

# ---------------- Janitorr (disk-based media cleanup) ----------------
# Headless daemon (jvm-stable v2.1.x serves NO HTTP — no ports to publish). Status
# on the dashboard comes from the caddy docker-health.json helper, not a siteMonitor.
  janitorr:
    image: ghcr.io/schaka/janitorr:jvm-stable
    container_name: janitorr
    networks: [ servarrnet ]
    user: "${PUID}:${PGID}"
    mem_limit: 512M          # heap is derived from this; 256M min, 512M for a large library
    mem_swappiness: 0
    environment:
      - TZ=${TZ}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
      - JELLYFIN_USERNAME=${JELLYFIN_USERNAME}
      - JELLYFIN_PASSWORD=${JELLYFIN_PASSWORD}
      - JELLYSEERR_API_KEY=${JELLYSEERR_API_KEY}
    volumes:
      - ./janitorr/config/application.yml:/config/application.yml
      - ./janitorr/logs:/logs
      - /mnt/media:/data
    restart: unless-stopped

# ---------------- Soulseek (VPN) ----------------
  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    network_mode: "service:pia-tun"
    depends_on:
      pia-tun:
        condition: service_healthy
    environment:
      - TZ=${TZ}
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_SLSK_USERNAME=${SLSK_USERNAME}
      - SLSKD_SLSK_PASSWORD=${SLSK_PASSWORD}
      - SLSKD_USERNAME=${SLSKD_WEB_USER}
      - SLSKD_PASSWORD=${SLSKD_WEB_PASS}
      - SLSKD_API_KEY=${SLSKD_API_KEY}
      - SLSKD_DOWNLOADS_DIR=/app/downloads
      - SLSKD_UMASK=002
    volumes:
      - ./slskd:/app
      - ${MUSIC}/incoming:/app/downloads
    restart: unless-stopped

# ---------------- Soulbeet ----------------
  soulbeet:
    image: docker.io/docccccc/soulbeet:latest
    container_name: soulbeet
    networks: [ servarrnet ]
    ports:
      - "9765:9765"
    environment:
      - DATABASE_URL=sqlite:/data/soulbeet.db
      - DOWNLOAD_PATH=/downloads
      # Use the path we just discovered
      - BEETS_CONFIG=/root/.config/beets/config.yaml
      - TZ=${TZ}
      - SLSKD_URL=http://gluetun:5030
      - SLSKD_API_KEY=${SLSKD_API_KEY}
    volumes:
      - ./soulbeet:/data
      # We mount the file directly to the path Beets reported
      - ./soulbeet-config/config.yaml:/root/.config/beets/config.yaml
      - ${MUSIC}/incoming:/downloads
      - ${MUSIC}:/music
    restart: unless-stopped
# ---------------- Navidrome ----------------
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    networks: [ servarrnet ]
    ports:
      - "4533:4533"
    environment:
      - ND_LOGLEVEL=info
      - ND_SCANSCHEDULE=1h
      - ND_MUSICFOLDER=/data/music
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - ND_SCANNER_GROUPALBUMRELEASES=true
    volumes:
      - ./navidrome:/data
      - ${MUSIC}:/data/music
    restart: unless-stopped

# ---------------- Flaresolverr ----------------
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    networks: [ servarrnet ]
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    restart: unless-stopped

# ---------------- MeTube ----------------
  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    networks: [ servarrnet ]
    ports:
      - "8081:8081"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - DOWNLOAD_DIR=/data/movies
      - YTDL_OPTIONS={"format":"mp4","merge_output_format":"mp4"}
    volumes:
      - ./metube:/config
      - ${DL}:/data/downloads
      - ${MOVIES}:/data/movies
    restart: unless-stopped

# ---------------- Autobrr ----------------
  autobrr:
    image: ghcr.io/autobrr/autobrr:latest
    container_name: autobrr
    networks: [ servarrnet ]
    ports:
      - "7474:7474"
    environment:
      - TZ=${TZ}
    volumes:
      - ./autobrr:/config
      - ./scripts/autobrr_duplicate_guard.sh:/app/autobrr_duplicate_guard.sh:ro
      - ${MOVIES}:/mnt/media/movies:ro
      - ${TV}:/mnt/media/tv:ro
    restart: unless-stopped

# ---------------- Cross-seed ----------------
  cross-seed:
    profiles: ["ratio-auto"]
    image: ghcr.io/cross-seed/cross-seed:latest
    container_name: cross-seed
    networks: [ servarrnet ]
    ports:
      - "2468:2468"
    depends_on:
      - prowlarr
      - pia-tun
      - qbittorrent
    user: "${PUID}:${PGID}"
    command: ["daemon"]
    volumes:
      - ./cross-seed:/config
      - ${DL}:/data/downloads
      - /mnt/media:/mnt/media
    restart: unless-stopped

# ---------------- Arr Extension Guard ----------------
  arr-extension-guard:
    image: python:3.12-alpine
    container_name: arr-extension-guard
    networks: [ servarrnet ]
    depends_on:
      - sonarr
      - radarr
      - pia-tun
      - qbittorrent
    environment:
      - TZ=${TZ}
      - POLL_SECONDS=60
      - BAD_EXTENSIONS=.exe,.scr
      - QBIT_URL=http://gluetun:8080
      - SONARR_URL=http://sonarr:8989
      - RADARR_URL=http://radarr:7878
      - SONARR_CONFIG=/config/sonarr/config.xml
      - RADARR_CONFIG=/config/radarr/config.xml
    command: ["python", "/app/arr_extension_guard.py"]
    volumes:
      - ./scripts/arr_extension_guard.py:/app/arr_extension_guard.py:ro
      - ./sonarr:/config/sonarr:ro
      - ./radarr:/config/radarr:ro
    restart: unless-stopped
