# Open WebUI (LLM chat front-end) on the openwebui host (CT 111, node server).
# llama-swap (LLM inference + embeddings + whisper STT) and Kokoro TTS are
# reached over the tailnet on the agent VM (100.64.0.10:9292 / :9494).
# Kokoro was tried on this CT and rolled back: the N5105 synthesized at
# RTF ~2.8 (11.3 s for a 4 s clip) vs well under realtime on the agent VM.
# Secrets render into .env from open-webui.enc.env (SOPS) at deploy time.
name: open-webui

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG:-main}
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    environment:
      # ollama is gone from this host -- disable the Ollama API entirely.
      - ENABLE_OLLAMA_API=false
      # Plural (list) vars: llama-swap (local) + MiniMax, semicolon-separated,
      # positions line up between URLs and keys. MiniMax keeps its real key
      # from open-webui.enc.env; llama-swap needs no auth, so it gets a dummy.
      - OPENAI_API_BASE_URLS=https://api.minimax.chat/v1;http://100.64.0.10:9292/v1
      - OPENAI_API_KEYS=${OPENAI_API_KEY};sk-local-llama-swap
      # STT -> whisper via llama-swap over the tailnet (OpenAI-compatible, no
      # auth). There is no standalone whisper-server on :9393 anymore.
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=http://100.64.0.10:9292/v1
      - AUDIO_STT_OPENAI_API_KEY=sk-local-whisper
      # TTS -> Kokoro on the agent VM (OpenAI-compatible, no auth)
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://100.64.0.10:9494/v1
      - AUDIO_TTS_OPENAI_API_KEY=sk-local-kokoro
      - AUDIO_TTS_MODEL=kokoro
      - AUDIO_TTS_VOICE=af_heart
      # RAG embeddings -> llama-swap's embeddinggemma
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_EMBEDDING_MODEL=embeddinggemma
      - RAG_OPENAI_API_BASE_URL=http://100.64.0.10:9292/v1
      - RAG_OPENAI_API_KEY=sk-local-llama-swap
      # Task model (title/tag generation) -> fast local model, arrives over the
      # OpenAI connection so it's "external" from OpenWebUI's point of view.
      - TASK_MODEL_EXTERNAL=qwen3-0.6b
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
    volumes:
      - open-webui:/app/backend/data

volumes:
  open-webui:
