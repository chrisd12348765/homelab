---
# docker role defaults — Docker CE from Docker's official apt repo (not Debian's
# docker.io package). docker.io's bundled containerd/overlay2 driver can't decompress
# zstd-compressed image layers (used by e.g. ghcr.io/home-assistant/home-assistant) —
# "failed to register layer: ApplyLayer exit status 1 stdout: stderr: archive/tar:
# invalid tar header". Docker CE's docker-compose-plugin apt package also replaces
# the old pinned-binary-from-GitHub-releases install.
docker_apt_arch: amd64
docker_keyring_path: /etc/apt/keyrings/docker.asc
