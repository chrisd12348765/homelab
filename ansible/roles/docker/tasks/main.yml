---
# roles/docker — install Docker CE (official apt repo) + Compose v2 plugin, enable
# the service. Stack deployment lives in the per-app playbooks (e.g. playbooks/immich.yml).
#
# NOT used on vpn-exit: that host's PIA killswitch blocks all external apt mirrors,
# so it can't reach download.docker.com either. It stays on docker.io — it doesn't
# run any zstd-layer images, so it doesn't need this.

- name: Remove conflicting Debian docker packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-doc
      - docker-compose
      - docker-compose-v2
      - podman-docker
      - containerd
      - runc
    state: absent

- name: Install prerequisites for the Docker apt repo
  ansible.builtin.package:
    name:
      - ca-certificates
      - curl
    state: present

- name: Ensure apt keyrings dir
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker's GPG key
  ansible.builtin.get_url:
    # Docker publishes separate per-distro repos/keys (debian vs ubuntu) —
    # media-stack is Ubuntu ("noble"), everything else here is Debian
    # ("bookworm"), so this can't be hardcoded to one distro.
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: "{{ docker_keyring_path }}"
    mode: "0644"

- name: Add the Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_arch }} signed-by={{ docker_keyring_path }}]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true

- name: Install Docker CE
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Ensure Docker is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
