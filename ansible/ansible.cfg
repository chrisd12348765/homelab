[defaults]
inventory = inventory.yml
roles_path = roles
host_key_checking = False
nocows = True
result_format = yaml

[ssh_connection]
pipelining = True
# Tailscale SSH's server intermittently kills ~5% of rapid multiplexed (ControlMaster)
# session opens, which Ansible surfaces as mid-play UNREACHABLE ("Data could not be
# sent to remote host"). The very next session always succeeds, so connection-level
# retries absorb it. Plain sshd targets are unaffected.
retries = 3
