# Copy to inventory.yml (gitignored) and fill real hosts/IPs.
# Reach nodes over Tailscale; group by role so plays target cleanly.
all:
  children:
    # Bare hosts (not Proxmox guests) running the dash-helpers disk-health
    # endpoints — roles/disk_health, playbooks/disk_health.yml. Two Proxmox
    # nodes' own boot disks + a standalone Pi doing backup/PBS duty; adjust
    # disk_health_drives/disk_health_zpool per host's actual disks.
    disk_health:
      hosts:
        node01:
          ansible_host: 100.64.0.11
          disk_health_name: ssd-health
          disk_health_port: 19922
          disk_health_zpool: rpool   # omit entirely on hosts that aren't root-on-ZFS
          disk_health_description: "SSD SMART + ZFS pool health endpoint for the Homepage dashboard."
          disk_health_unit_description: "SSD SMART + ZFS pool health endpoint for Homepage dashboard"
          disk_health_drives:
            - { dev: sda, role: ssd, kind: sata }
        node02:
          ansible_host: 100.64.0.10
          disk_health_name: hdd-health
          disk_health_port: 19922
          disk_health_description: "HDD/SSD SMART health endpoint for the Homepage dashboard."
          disk_health_unit_description: "HDD SMART health endpoint for Homepage dashboard"
          disk_health_drives:
            - { dev: sda, role: media, kind: sata }
            - { dev: nvme0n1, role: ssd, kind: nvme }
    docker_hosts:
      hosts:
        immich:      { ansible_host: 10.0.0.109 }
        vaultwarden: { ansible_host: 10.0.0.100 }
        obsidian:    { ansible_host: 10.0.0.103 }
        media-stack: { ansible_host: 10.0.0.105 }
        agent:       { ansible_host: 10.0.0.106 }
        homepage:    { ansible_host: 10.0.0.107 }   # Homepage; guest named "homarr"
        vpn-exit:    { ansible_host: 10.0.0.102 }   # PIA WireGuard exit (compose)
    native_hosts:
      hosts:
        adguard:     { ansible_host: 10.0.0.101 }   # LAN DNS resolver
        syncthing:   { ansible_host: 10.0.0.108 }   # sync hub
        caddy:       { ansible_host: 10.0.0.104 }   # reverse proxy + pve-sso sidecar
  vars:
    ansible_user: root
